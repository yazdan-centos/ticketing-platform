server.port=${SERVER_PORT:8047}

# --- Datasource ---
# Secrets come from the environment. DB_PASSWORD has no default on purpose so a
# real password is never committed; set it via env/secret manager before running.
spring.datasource.url=jdbc:postgresql://localhost/ticketing_platform_db
spring.datasource.username=postgres
spring.datasource.password=sgsec!1390
spring.datasource.driverClassName=org.postgresql.Driver

# --- JPA / Hibernate ---
# Schema is owned by Flyway; Hibernate only validates that the entities match it.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
#spring.flyway.enabled=${FLYWAY_ENABLED:true}
#spring.flyway.baseline-on-migrate=true

# --- JWT ---
# Override APP_JWT_SECRET in every real environment; the default is a dev-only key.
app.jwt.secret=VGlja2V0aW5nUGxhdGZvcm1Kd3RTZWNyZXRLZXlGb3JIUzI1NlNpZ25pbmc=
app.jwt.expiration=86400000
